name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    name: build / test / lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      # 도구 설치는 tools/install.sh로 통일 — 로컬과 CI가 같은 경로/버전 핀을 사용한다.
      - name: Install toolchain (build-only — no kind/helm/kubectl)
        run: bash tools/install.sh --build-only

      - name: Cache jsonnet vendor
        uses: actions/cache@v4
        with:
          path: vendor
          key: vendor-${{ hashFiles('jsonnetfile.lock.json') }}
          restore-keys: vendor-

      - name: jb install
        run: jb install

      - run: make build
      - run: make test
      - run: make lint

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manifests
          path: manifests/
