name: CI

on:
  pull_request:
  # main push 트리거는 실제 검증이 추가되는 다음 PR에서 활성화한다.
  # 지금은 stub job이라 실행해도 의미 없음.

jobs:
  validate:
    name: validate (stub)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stub — TODO in next PR
        run: |
          echo "[stub] CI not yet implemented."
          echo "Next PR will add:"
          echo "  - jb install (cached)"
          echo "  - make build  (jsonnet → manifests/)"
          echo "  - make test   (promtool test rules)"
          echo "  - make lint   (jsonnet-lint + kubeconform)"
          echo "  - PR comment with diff of generated manifests"
