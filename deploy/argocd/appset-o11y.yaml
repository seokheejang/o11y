# ApplicationSet — env별 App-of-Apps root Application을 자동 generate.
#
# 패턴: Cluster Generator + cluster Secret labels.
#   - ArgoCD가 인지하는 cluster Secret 중 `o11y/managed: "true"` 라벨이 박힌 것만 picking
#   - 각 cluster의 라벨(o11y/provider, o11y/stage, o11y/cluster)로 git path를 합성
#       → `deploy/envs/{provider}-{stage}-{cluster}/apps`
#
# 환경 추가 절차 (카피본 운영자):
#   1) 새 cluster Secret 만들거나 기존에 `o11y/*` 라벨 박기 (docs/cluster-labels.md 참조)
#   2) `deploy/envs/<provider>-<stage>-<cluster>/` 디렉토리 추가 (`deploy/envs/example-dev/`을 출발점으로)
#   3) commit + push → ApplicationSet이 새 env 자동 generate
#
# 환경 제거: cluster Secret 라벨 제거 또는 Secret 삭제 → ApplicationSet이 root App finalize.
#
# 카피본 운영자: REPLACE_WITH_REPO_URL을 자기 카피본 git URL로 치환.

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: o11y-stack
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: o11y
spec:
  goTemplate: true
  goTemplateOptions: ['missingkey=error']

  generators:
    - clusters:
        # ArgoCD가 인지하는 cluster Secret 중 o11y/managed="true" 만 매치.
        # in-cluster(default)도 명시적 Secret으로 등록해야 selector에 잡힌다 — docs/cluster-labels.md 참조.
        selector:
          matchLabels:
            o11y/managed: "true"

  template:
    metadata:
      name: '{{index .metadata.labels "o11y/provider"}}-{{index .metadata.labels "o11y/stage"}}-{{index .metadata.labels "o11y/cluster"}}-o11y'
      namespace: argocd
      labels:
        app.kubernetes.io/managed-by: argocd
        app.kubernetes.io/component: app-of-apps
        env: '{{index .metadata.labels "o11y/provider"}}-{{index .metadata.labels "o11y/stage"}}-{{index .metadata.labels "o11y/cluster"}}'
        o11y/provider: '{{index .metadata.labels "o11y/provider"}}'
        o11y/stage: '{{index .metadata.labels "o11y/stage"}}'
        o11y/cluster: '{{index .metadata.labels "o11y/cluster"}}'
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      source:
        repoURL: REPLACE_WITH_REPO_URL
        targetRevision: HEAD
        path: 'deploy/envs/{{index .metadata.labels "o11y/provider"}}-{{index .metadata.labels "o11y/stage"}}-{{index .metadata.labels "o11y/cluster"}}/apps'
        directory:
          recurse: false
      destination:
        # root Application은 cluster Secret의 server URL로 sync (self-managed면 그 cluster).
        # child Application yaml들이 자체 destination.server를 박음 (현재 in-cluster).
        # multi-cluster (root in mgmt, child in target) 필요 시 별도 패턴 — 향후 결정.
        server: '{{.server}}'
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
