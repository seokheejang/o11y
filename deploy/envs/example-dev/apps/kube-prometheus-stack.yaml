# kube-prometheus-stack helm chart Application — env 단위 sync.
#
# multi-source 패턴:
#   - source 1: 공식 helm chart (artifacthub)
#   - source 2: 카피본 git repo — values-base.yaml + env values.yaml 머지 (ArgoCD가 순서대로 적용)
#
# fork 받은 운영자: REPLACE_* 토큰만 채우면 끝. chart 버전은 환경별 자유 선택 가능
# (e2e는 OSS 최신 stable, prod는 더 보수적 — 정합 강제 X).

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: replace-env-name-kube-prometheus-stack    # 예: dev-us-east-1-kube-prometheus-stack
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd
    env: replace-env-name
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    # === source 1: 공식 chart ===
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 85.0.2    # 환경별로 자유롭게 (artifacthub에서 release 확인)
      helm:
        releaseName: kube-prometheus-stack
        valueFiles:
          - $values/deploy/envs/_base/values-base.yaml
          - $values/deploy/envs/replace-env-name/values.yaml
    # === source 2: values overlay (카피본 git) ===
    - repoURL: REPLACE_WITH_REPO_URL
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  # ⚠️ auto-sync 의도적 제거 (수동 sync) — 안전 디폴트.
  # chart App은 보통 운영 중이던 helm release(Prometheus/Grafana 본체 + PVC)를 adopt하는 stateful App.
  # selfHeal/prune이 본체·운영 데이터를 건드릴 blast radius가 커서, diff 검토 후 수동 sync를 권장한다.
  # best-practice: stateful/adopted 스택 = 수동, 재생성 가능한 `o11y-rules` App = auto 유지.
  # 빈 클러스터에 신규 배포라 위험이 없다면 fork에서 `automated` 블록을 다시 넣어도 된다.
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # CRD-heavy chart라 SSA 권장
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    # operator가 자기 자원에 추가하는 metadata 무시 (chart upgrade 시 diff 노이즈)
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/volumeClaimTemplates
    # `alertmanagerConfigMatcherStrategy`는 `_base/values-base.yaml`(chart values)이 단일 truth source.
    # 같은 필드를 `ignoreDifferences`에 박으면 ArgoCD가 영원히 ignore하여 cluster CR에 적용되지 않음.
    # 비상시에만 `patches/alertmanager-matcherstrategy.yaml` 등으로 manual 적용. 평상시는 ignoreDifferences에 추가 X.
