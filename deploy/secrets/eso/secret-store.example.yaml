# SecretStore (또는 ClusterSecretStore) — backend(예: Vault, AWS Secrets Manager) 참조.
#
# 카피본 운영자가 자기 backend에 맞게 채우는 placeholder. ESO 자체 설치는 별도 (helm chart).
# kind/provider 종류는 https://external-secrets.io/latest/api/components/ 참조.

apiVersion: external-secrets.io/v1beta1
kind: SecretStore                          # 또는 ClusterSecretStore (전역)
metadata:
  name: REPLACE_WITH_STORE_NAME             # 예: vault-monitoring
  namespace: monitoring
spec:
  provider:
    # === 예시 1: HashiCorp Vault ===
    vault:
      server: REPLACE_WITH_VAULT_URL        # 예: https://vault.<your-env>.example.com
      path: secret                          # KV mount path
      version: v2
      auth:
        # Kubernetes auth method 권장 (Pod IRSA 또는 SA token)
        kubernetes:
          mountPath: kubernetes
          role: REPLACE_WITH_VAULT_ROLE     # 예: alertmanager-reader
          serviceAccountRef:
            name: external-secrets

    # === 예시 2: AWS Secrets Manager (위 vault block 대신 사용) ===
    # aws:
    #   service: SecretsManager
    #   region: us-east-1
    #   auth:
    #     jwt:
    #       serviceAccountRef:
    #         name: external-secrets   # IRSA 연결된 SA
