# ExternalSecret — Slack webhook URL을 backend에서 Kubernetes Secret으로 동기화.
#
# `secret-store.example.yaml`의 SecretStore가 참조하는 backend 경로에 webhook URL이 저장되어
# 있어야 한다. ExternalSecret이 그 값을 가져와 `alertmanager-slack-webhook` Secret을 만든다.
#
# 카피본 운영자는 secretStoreRef.name, remoteRef.key/property를 자기 backend에 맞게 갱신.

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alertmanager-slack-webhook
  namespace: monitoring
spec:
  refreshInterval: 1h   # 환경 정책에 따라 짧게/길게 (rotation 빈도와 정합)
  secretStoreRef:
    kind: SecretStore                       # 또는 ClusterSecretStore
    name: replace-with-store-name           # secret-store.example.yaml의 metadata.name (DNS-1123)
  target:
    name: alertmanager-slack-webhook        # AlertmanagerConfig가 참조하는 Secret 이름 — 고정
    creationPolicy: Owner                   # target은 이 ExternalSecret과 같은 ns에 생성됨
  data:
    - secretKey: url                        # k8s Secret 안의 키 — AlertmanagerConfig는 이 키를 참조
      remoteRef:
        key: replace-with-backend-path      # 예: monitoring/alertmanager/slack
        property: url                       # backend secret object의 필드명
