# SealedSecret 예시 — Slack webhook URL.
#
# 실제 사용 절차:
#   1) 평문 Secret을 stdin에 만든다 (커밋 X):
#      kubectl create secret generic alertmanager-slack-webhook \
#        --namespace monitoring \
#        --from-literal=url='https://hooks.slack.com/services/XXX/YYY/ZZZ' \
#        --dry-run=client -o yaml > /tmp/plain-secret.yaml
#
#   2) kubeseal로 SealedSecret 생성 (controller의 public key 사용):
#      kubeseal --controller-namespace=kube-system \
#               --controller-name=sealed-secrets-controller \
#               -o yaml < /tmp/plain-secret.yaml > deploy/envs/<your-env>/secrets/slack-webhook.yaml
#
#   3) /tmp/plain-secret.yaml 삭제. SealedSecret 파일만 git에 커밋.
#
# 아래 encryptedData는 PLACEHOLDER. 실제 환경에서 kubeseal이 생성한 base64 ciphertext로 교체.

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: alertmanager-slack-webhook
  namespace: monitoring
spec:
  encryptedData:
    url: PLACEHOLDER_ENCRYPTED_BASE64_BLOB   # kubeseal output
  template:
    metadata:
      name: alertmanager-slack-webhook
      namespace: monitoring
    type: Opaque
