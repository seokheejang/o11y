# kind 환경에 맞춘 kube-prometheus-stack 경량 values.
# 디폴트(2Gi+ memory, retention 10d)면 kind 노드에서 OOMKill 위험.
#
# 끄는 것:
#   - alertmanager  : AMC admit + raw amtool 검증으로 라우팅 정확성 보장됨. 본체 띄울 필요 X.
#   - nodeExporter  : kind 노드의 호스트 메트릭은 e2e에서 의미 없음
#
# 켜놓는 것:
#   - prometheus, grafana, kube-state-metrics, prometheus-operator
#     (rule reload + dashboard sidecar 동작 검증 목적)
#
# 의도적으로 dev2(내부 배포 환경)와 정합 강제하지 않음 — e2e는 OSS 최신 stable 기준 단순 기능 검증.

defaultRules:
  create: false  # 우리는 자체 mixin이 만든 룰을 apply 한다 — 차트 기본 룰과 중복 회피.

alertmanager:
  enabled: false

nodeExporter:
  enabled: false

prometheus:
  # NodePort + 핀된 nodePort. kind cluster.yaml의 extraPortMappings와 짝 →
  # 호스트의 http://localhost:9090로 바로 접근 (port-forward 불필요).
  service:
    type: NodePort
    nodePort: 30090
  prometheusSpec:
    retention: 1h
    walCompression: true
    resources:
      requests:
        cpu: 50m
        memory: 200Mi
      limits:
        memory: 600Mi
    # PrometheusRule 라벨 셀렉터 — 우리 wrapper가 다는 라벨에 맞춤.
    ruleSelectorNilUsesHelmValues: false
    ruleSelector:
      matchLabels:
        app.kubernetes.io/managed-by: o11y

grafana:
  enabled: true
  adminPassword: admin
  # NodePort + 핀된 nodePort → 호스트의 http://localhost:3000로 바로 접근.
  service:
    type: NodePort
    nodePort: 30030
  resources:
    requests:
      cpu: 50m
      memory: 100Mi
    limits:
      memory: 256Mi
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"

prometheusOperator:
  resources:
    requests:
      cpu: 50m
      memory: 100Mi
    limits:
      memory: 256Mi

kubeStateMetrics:
  enabled: true

kube-state-metrics:
  resources:
    requests:
      cpu: 20m
      memory: 50Mi
    limits:
      memory: 128Mi
