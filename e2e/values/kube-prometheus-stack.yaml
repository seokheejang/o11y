# kind 환경에 맞춘 kube-prometheus-stack 경량 values.
# 디폴트(2Gi+ memory, retention 10d)면 kind 노드에서 OOMKill 위험.
#
# 끄는 것:
#   - alertmanager  : 4차 PR(라우팅) 시점에 켬
#   - nodeExporter  : kind 노드의 호스트 메트릭은 e2e에서 의미 없음
#
# 켜놓는 것:
#   - prometheus, grafana, kube-state-metrics, prometheus-operator
#     (rule reload + dashboard sidecar 동작 검증 목적)

defaultRules:
  create: false  # 우리는 자체 mixin이 만든 룰을 apply 한다 — 차트 기본 룰과 중복 회피.

alertmanager:
  enabled: false

nodeExporter:
  enabled: false

prometheus:
  prometheusSpec:
    retention: 1h
    walCompression: true
    resources:
      requests:
        cpu: 50m
        memory: 200Mi
      limits:
        memory: 600Mi
    # PrometheusRule 라벨 셀렉터 — 우리 wrapper가 다는 라벨에 맞춤.
    ruleSelectorNilUsesHelmValues: false
    ruleSelector:
      matchLabels:
        app.kubernetes.io/managed-by: o11y

grafana:
  enabled: true
  adminPassword: admin
  resources:
    requests:
      cpu: 50m
      memory: 100Mi
    limits:
      memory: 256Mi
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"

prometheusOperator:
  resources:
    requests:
      cpu: 50m
      memory: 100Mi
    limits:
      memory: 256Mi

kubeStateMetrics:
  enabled: true

kube-state-metrics:
  resources:
    requests:
      cpu: 20m
      memory: 50Mi
    limits:
      memory: 128Mi
